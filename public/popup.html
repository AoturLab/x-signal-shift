<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalShift</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030712;
        --panel: #0f172a;
        --line: rgba(71, 85, 105, 0.42);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #22d3ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        background: radial-gradient(circle at top right, rgba(34, 211, 238, 0.16), transparent 28%), linear-gradient(180deg, #020617, #0b1120 55%, #020617);
        color: var(--text);
        font: 14px/1.5 "SF Pro Display", "Segoe UI", ui-sans-serif, sans-serif;
      }
      main { padding: 16px; }
      .launcher {
        border-radius: 22px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.98));
        box-shadow: 0 22px 48px rgba(2, 8, 23, 0.42);
        padding: 16px;
        display: grid;
        gap: 14px;
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #67e8f9;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.15;
      }
      .lead, .muted, .hint-box, .error-box span {
        color: var(--muted);
        font-size: 12px;
      }
      .status-row {
        display: grid;
        gap: 6px;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(71, 85, 105, 0.28);
        background: rgba(15, 23, 42, 0.82);
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        display: inline-block;
        margin-right: 8px;
        background: #64748b;
      }
      .status-dot.running { background: #22d3ee; }
      .status-dot.error { background: #fb7185; }
      .status-dot.paused { background: #fbbf24; }
      .button-stack {
        display: grid;
        gap: 8px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 11px 12px;
        cursor: pointer;
        color: white;
        font: inherit;
        font-weight: 700;
      }
      button:not(.secondary) {
        background: linear-gradient(135deg, #0891b2, #22d3ee);
      }
      button.secondary {
        background: rgba(30, 41, 59, 0.96);
        border: 1px solid rgba(71, 85, 105, 0.36);
      }
      .hint-box, .error-box {
        border-radius: 14px;
        padding: 12px;
        border: 1px solid rgba(71, 85, 105, 0.24);
        background: rgba(15, 23, 42, 0.78);
      }
      .error-box {
        border-color: rgba(251, 113, 133, 0.24);
        background: rgba(76, 5, 25, 0.22);
        display: grid;
        gap: 4px;
      }
      .error-box strong {
        font-size: 13px;
        line-height: 1.45;
        color: #ffe4e6;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="popup.global.js"></script>
  </body>
</html>
