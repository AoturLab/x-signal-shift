<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Feedback Loop Rewriter</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --panel: #17212b;
        --muted: #8b98a5;
        --line: #253341;
        --text: #f7f9f9;
        --accent: #1d9bf0;
        --accent-2: #173d55;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 360px;
        background: radial-gradient(circle at top right, #183349, var(--bg) 55%);
        color: var(--text);
        font: 14px/1.4 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main { padding: 16px; display: grid; gap: 14px; }
      h1 { margin: 0; font-size: 18px; }
      p { margin: 0; color: var(--muted); }
      .panel {
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, black);
        border-radius: 16px;
        padding: 14px;
        display: grid;
        gap: 10px;
      }
      .row { display: grid; gap: 6px; }
      label { font-size: 12px; color: var(--muted); }
      input, select, textarea, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #0c1116;
        color: var(--text);
        padding: 10px 12px;
      }
      textarea { resize: vertical; min-height: 72px; }
      button {
        background: linear-gradient(135deg, var(--accent), #5cb4f3);
        color: white;
        font-weight: 600;
        border: 0;
        cursor: pointer;
      }
      button.secondary {
        background: var(--accent-2);
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
      }
      .stat strong {
        display: block;
        font-size: 16px;
      }
      .hint { font-size: 12px; color: var(--muted); }
      .status-live { color: #67e8f9; }
      .status-idle { color: #94a3b8; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="popup.global.js"></script>
  </body>
  </html>
